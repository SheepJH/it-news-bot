<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 160" width="100%">
  <style>
    .box {
      fill: none;
      stroke: #6e7681;
      stroke-width: 1.5;
    }
    .label {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Pretendard", sans-serif;
      font-size: 17px;
      font-weight: 700;
      fill: #c9d1d9;
      text-anchor: middle;
    }
    .emoji {
      font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
      font-size: 32px;
      text-anchor: middle;
    }
    .arrow {
      stroke: #6e7681;
      stroke-width: 2;
      fill: none;
    }
    @media (prefers-color-scheme: light) {
      .label { fill: #1f2328; }
      .box, .arrow { stroke: #8b949e; }
    }
  </style>
  <defs>
    <marker id="arrowhead" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6e7681"/>
    </marker>
  </defs>

  <!-- Box 1: RSS -->
  <rect class="box" x="10" y="20" width="220" height="120" rx="10"/>
  <text class="emoji" x="120" y="70">📰</text>
  <text class="label" x="120" y="110">RSS 수집</text>

  <!-- Arrow 1 -->
  <line class="arrow" x1="240" y1="80" x2="280" y2="80" marker-end="url(#arrowhead)"/>

  <!-- Box 2: AI -->
  <rect class="box" x="290" y="20" width="220" height="120" rx="10"/>
  <text class="emoji" x="400" y="70">🤖</text>
  <text class="label" x="400" y="110">AI 선별·요약</text>

  <!-- Arrow 2 -->
  <line class="arrow" x1="520" y1="80" x2="560" y2="80" marker-end="url(#arrowhead)"/>

  <!-- Box 3: Card -->
  <rect class="box" x="570" y="20" width="220" height="120" rx="10"/>
  <text class="emoji" x="680" y="70">🎨</text>
  <text class="label" x="680" y="110">카드 이미지 생성</text>

  <!-- Arrow 3 -->
  <line class="arrow" x1="800" y1="80" x2="840" y2="80" marker-end="url(#arrowhead)"/>

  <!-- Box 4: Slack -->
  <rect class="box" x="850" y="20" width="220" height="120" rx="10"/>
  <text class="emoji" x="960" y="70">💬</text>
  <text class="label" x="960" y="110">Slack 자동 발송</text>
</svg>
